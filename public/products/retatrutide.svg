<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="vial" x1="160" y1="80" x2="240" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e8ff" stop-opacity="0.9"/><stop offset="100%" stop-color="#a0b4ff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="liquid" x1="170" y1="250" x2="230" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cap" x1="175" y1="60" x2="225" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="12"/>
  <ellipse cx="200" cy="350" rx="60" ry="20" fill="#8b5cf6" opacity="0.15" filter="url(#glow)"/>
  <rect x="170" y="100" width="60" height="280" rx="8" fill="url(#vial)" stroke="#c0d0ff" stroke-width="1.5"/>
  <rect x="173" y="240" width="54" height="137" rx="6" fill="url(#liquid)" opacity="0.8"/>
  <rect x="165" y="70" width="70" height="35" rx="4" fill="url(#cap)"/>
  <rect x="175" y="60" width="50" height="15" rx="3" fill="#22d3ee"/>
  <rect x="163" y="98" width="74" height="8" rx="2" fill="#c0c0c0" opacity="0.7"/>
  <rect x="175" y="145" width="50" height="75" rx="3" fill="white" opacity="0.9"/>
  <text x="200" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1a1a3e">Retatrutide</text>
  <text x="200" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#666">3mg</text>
  <text x="200" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">99.3% Pure</text>
  <line x1="180" y1="200" x2="220" y2="200" stroke="#ddd" stroke-width="0.5"/>
  <text x="200" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#999">RUO</text>
  <!-- New badge -->
  <circle cx="245" cy="130" r="16" fill="#8b5cf6" opacity="0.9"/>
  <text x="245" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">NEW</text>
  <text x="200" y="435" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1">RETATRUTIDE</text>
  <text x="200" y="460" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8899cc">Triple Agonist Peptide</text>
</svg>