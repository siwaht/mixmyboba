<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="vial" x1="160" y1="80" x2="240" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a0b4ff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="liquid" x1="170" y1="250" x2="230" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec407a"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="cap" x1="175" y1="60" x2="225" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec407a"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="12"/>
  <ellipse cx="200" cy="350" rx="60" ry="20" fill="#ec407a" opacity="0.15" filter="url(#glow)"/>
  <rect x="170" y="100" width="60" height="280" rx="8" fill="url(#vial)" stroke="#c0d0ff" stroke-width="1.5"/>
  <rect x="173" y="240" width="54" height="137" rx="6" fill="url(#liquid)" opacity="0.8"/>
  <rect x="165" y="70" width="70" height="35" rx="4" fill="url(#cap)"/>
  <rect x="175" y="60" width="50" height="15" rx="3" fill="#f48fb1"/>
  <rect x="163" y="98" width="74" height="8" rx="2" fill="#c0c0c0" opacity="0.7"/>
  <rect x="175" y="150" width="50" height="70" rx="3" fill="white" opacity="0.9"/>
  <text x="200" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#1a1a3e">Gonadorelin</text>
  <text x="200" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#1a1a3e">(GnRH)</text>
  <text x="200" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#666">2mg</text>
  <text x="200" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">99.3% Pure</text>
  <line x1="232" y1="260" x2="240" y2="260" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="232" y1="300" x2="240" y2="300" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="232" y1="340" x2="240" y2="340" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <text x="200" y="432" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" letter-spacing="1">GONADORELIN</text>
  <text x="200" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f48fb1">GnRH Agonist</text>
</svg>